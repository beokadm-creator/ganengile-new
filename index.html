<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" name="viewport" />
  <title>가는길에 - 지하철 크라우드 배송</title>

  <!-- 파비콘 -->
  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2838/2838694.png" />

  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://code.ionicframework.com/ionicons/2.0.1/css/ionicons.min.css" rel="stylesheet">

  <style>
    /* 기본 리셋 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #root {
      width: 100%;
      height: 100%;
    }

    /* Ensure icons render correctly */
    .material-icons, .ion-icon {
      font-family: 'Material Icons', 'Ionicons', sans-serif;
      font-weight: normal;
      font-style: normal;
      font-size: 24px;
      line-height: 1;
      letter-spacing: normal;
      text-transform: none;
      display: inline-block;
      white-space: nowrap;
      word-wrap: normal;
      direction: ltr;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    /* 웹 브라우저 스크롤바 스타일링 */
    ::-webkit-scrollbar {
      width: 0px;
      background: transparent;
    }

    body {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* PC에서의 배경 그라데이션 효과 */
    @media (min-width: 768px) {
      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      }
    }

    /* 로딩 스피너 */
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      z-index: 9999;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* React Native Web용 추가 스타일 */
    #root > div {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <!-- 로딩 스피너 -->
  <div id="loading">
    <div class="spinner"></div>
  </div>

  <!-- 앱 루트 -->
  <div id="root"></div>

  <script>
    // 로딩 스피너 제거
    window.addEventListener('load', () => {
      setTimeout(() => {
        const loading = document.getElementById('loading');
        if (loading) {
          loading.style.opacity = '0';
          loading.style.transition = 'opacity 0.5s';
          setTimeout(() => loading.remove(), 500);
        }
      }, 1000);
    });

    // Icon name to emoji mapping
    const iconEmojis = {
      'waving-hand': '👋',
      'inventory': '📦',
      'check-circle': '✅',
      'inventory-2': '📦',
      'chevron-right': '▶',
      'subway': '🚇',
      'location-on': '📍',
      'local-shipping': '🚚',
      'payments': '💰',
      'star': '⭐',
      'star-rate': '⭐',
      'pedal-bike': '🚲',
      'card-outline': '💳',
      'car-outline': '🚗',
      'airplane-outline': '✈️',
    };

    // Replace icons with emoji after page load
    function replaceIconsWithEmoji() {
      const icons = document.querySelectorAll('.material-icons, .ionicons, [class*="MaterialIcons"], [class*="Ionicons"]');
      icons.forEach(icon => {
        const iconName = icon.textContent?.trim();
        if (iconName && iconEmojis[iconName]) {
          icon.textContent = iconEmojis[iconName];
          icon.style.visibility = 'visible';
          icon.style.fontSize = window.getComputedStyle(icon).fontSize || '24px';
          icon.style.color = window.getComputedStyle(icon).color || '#000';
        }
      });
    }

    // Run on load and with delay
    window.addEventListener('load', replaceIconsWithEmoji);
    setTimeout(replaceIconsWithEmoji, 100);
    setTimeout(replaceIconsWithEmoji, 500);
    setTimeout(replaceIconsWithEmoji, 1000);
  </script>
</body>
</html>
