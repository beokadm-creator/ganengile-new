name: Deploy on Merge

on:
  push:
    branches: [ main ]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      firestore: ${{ steps.filter.outputs.firestore }}
      functions: ${{ steps.filter.outputs.functions }}
      hosting: ${{ steps.filter.outputs.hosting }}
      admin-web: ${{ steps.filter.outputs.admin-web }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔍 Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            firestore:
              - 'firestore.rules'
              - 'firestore.indexes.json'
            functions:
              - 'functions/**'
            hosting:
              - 'src/**'
              - 'public/**'
              - 'app.json'
              - 'metro.config.js'
              - 'webpack.config.js'
              - 'babel.config.js'
            admin-web:
              - 'admin-web/**'

  deploy-firestore:
    name: Deploy Firestore Rules
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.firestore == 'true'
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 🔐 Setup Firebase
        run: |
          npm install -g firebase-tools
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" > service-account.json
          export GOOGLE_APPLICATION_CREDENTIALS=service-account.json
          firebase projects:use ganengile

      - name: 🚀 Deploy Firestore rules
        run: |
          export GOOGLE_APPLICATION_CREDENTIALS=service-account.json
          firebase deploy --only firestore:rules --project ganengile

      - name: 🧹 Cleanup
        if: always()
        run: rm -f service-account.json

  deploy-functions:
    name: Deploy Cloud Functions
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.functions == 'true'
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 🔧 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 🏗️ Build functions
        run: |
          npm --prefix functions ci --legacy-peer-deps
          npm --prefix functions run build

      - name: 🔐 Setup Firebase
        run: |
          npm install -g firebase-tools
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" > service-account.json
          export GOOGLE_APPLICATION_CREDENTIALS=service-account.json
          firebase projects:use ganengile

      - name: 🚀 Deploy functions
        run: |
          export GOOGLE_APPLICATION_CREDENTIALS=service-account.json
          firebase deploy --only functions --project ganengile

      - name: 🧹 Cleanup
        if: always()
        run: rm -f service-account.json

  deploy-hosting:
    name: Deploy Firebase Hosting
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.hosting == 'true'
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 🔧 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 🔨 Build web
        run: npm run web:export

      - name: 🔐 Setup Firebase
        run: |
          npm install -g firebase-tools
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" > service-account.json
          export GOOGLE_APPLICATION_CREDENTIALS=service-account.json
          firebase projects:use ganengile

      - name: 🚀 Deploy hosting
        run: |
          export GOOGLE_APPLICATION_CREDENTIALS=service-account.json
          firebase deploy --only hosting --project ganengile

      - name: 🧹 Cleanup
        if: always()
        run: rm -f service-account.json

  pre-flight-check:
    name: Post-Deploy Verification
    runs-on: ubuntu-latest
    needs: [ deploy-firestore, deploy-functions, deploy-hosting ]
    if: always()
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ✅ Run pre-flight check
        run: |
          chmod +x scripts/pre-flight-check.sh
          ./scripts/pre-flight-check.sh

  notify:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [ detect-changes, deploy-firestore, deploy-functions, deploy-hosting ]
    if: always()
    permissions:
      contents: read

    steps:
      - name: 📋 Generate summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Firestore Rules | ${{ needs.detect-changes.outputs.firestore == 'true' && '✅ Deployed' || '⏭️ No changes' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Functions | ${{ needs.detect-changes.outputs.functions == 'true' && '✅ Deployed' || '⏭️ No changes' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Hosting | ${{ needs.detect-changes.outputs.hosting == 'true' && '✅ Deployed' || '⏭️ No changes' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Admin Web | ${{ needs.detect-changes.outputs.admin-web == 'true' && '✅ App Hosting auto-deploys' || '⏭️ No changes' }} |" >> $GITHUB_STEP_SUMMARY
