name: Wiki Sync

on:
  push:
    branches:
      - main

jobs:
  sync-to-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Build daily digest
        id: digest
        run: |
          # Get commits between HEAD and HEAD~1 (the pushed commits)
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.event.after }}"
          
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            # First push or new repo — use last commit only
            COMMITS=$(git log -1 --pretty=format:"%h|%s|%an")
          else
            COMMITS=$(git log "${BEFORE}..${AFTER}" --pretty=format:"%h|%s|%an" --reverse)
          fi
          
          TOTAL=$(echo "$COMMITS" | grep -c '|' || true)
          echo "Total commits to sync: $TOTAL"
          
          if [ "$TOTAL" -eq 0 ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          DATE_YYYY_MM_DD=$(TZ=Asia/Seoul date +'%Y-%m-%d')
          DATE_YYYY_MM=$(TZ=Asia/Seoul date +'%Y-%m')
          DATE_MONTH=$(TZ=Asia/Seoul date +'%-m')
          DATE_DAY=$(TZ=Asia/Seoul date +'%-d')
          
          # Build TipTap JSON content
          TIPTAP_JSON='{"type":"doc","content":['
          TIPTAP_JSON+='{"type":"heading","attrs":{"level":2},"content":[{"type":"text","text":"'${DATE_MONTH}'월 '${DATE_DAY}'일 — 커밋 '"${TOTAL}"'개"}]},'
          
          COMMIT_INDEX=0
          HASHES=""
          FIRST_SUBJECT=""
          while IFS='|' read -r HASH MSG AUTHOR; do
            [ -z "$HASH" ] && continue
            
            if [[ "$MSG" =~ ^([a-zA-Z]+)(\([^)]*\))?:\ (.+) ]]; then
              SUBJECT="${BASH_REMATCH[3]}"
            else
              SUBJECT="$MSG"
            fi
            
            [ -z "$FIRST_SUBJECT" ] && FIRST_SUBJECT="$SUBJECT"
            HASHES="${HASHES}${HASH},"
            
            SAFE_MSG=$(echo "$MSG" | sed 's/\\/\\\\/g; s/"/\\"/g')
            SAFE_AUTHOR=$(echo "$AUTHOR" | sed 's/\\/\\\\/g; s/"/\\"/g')
            
            if [ $COMMIT_INDEX -gt 0 ]; then
              TIPTAP_JSON+=','
            fi
            TIPTAP_JSON+='{"type":"heading","attrs":{"level":3},"content":[{"type":"text","text":"'"${HASH}"' — '"${SAFE_MSG}"'"}]},'
            TIPTAP_JSON+='{"type":"paragraph","content":[{"type":"text","text":"작성자: '"${SAFE_AUTHOR}"'"}]}'
            
            COMMIT_INDEX=$((COMMIT_INDEX + 1))
          done <<< "$COMMITS"
          
          HASHES=$(echo "$HASHES" | sed 's/,$//')
          TIPTAP_JSON+=']}'
          
          TITLE="${DATE_MONTH}월 ${DATE_DAY}일 — ${FIRST_SUBJECT}"
          if [ ${#TITLE} -gt 80 ]; then
            TITLE="${DATE_MONTH}월 ${DATE_DAY}일 — 커밋 ${TOTAL}개"
          fi
          
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "date_group=$DATE_YYYY_MM_DD" >> $GITHUB_OUTPUT
          echo "month_group=$DATE_YYYY_MM" >> $GITHUB_OUTPUT
          echo "hashes=$HASHES" >> $GITHUB_OUTPUT
          
          EOF_DELIM=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "content<<$EOF_DELIM" >> $GITHUB_OUTPUT
          echo "$TIPTAP_JSON" >> $GITHUB_OUTPUT
          echo "$EOF_DELIM" >> $GITHUB_OUTPUT

      - name: Send to Wiki
        if: steps.digest.outputs.skip != 'true'
        uses: actions/github-script@v7
        env:
          WIKI_API_URL: ${{ secrets.WIKI_API_URL }}
          WIKI_API_KEY: ${{ secrets.WIKI_API_KEY }}
          PAYLOAD_TITLE: ${{ steps.digest.outputs.title }}
          PAYLOAD_CONTENT: ${{ steps.digest.outputs.content }}
          PAYLOAD_DATE_GROUP: ${{ steps.digest.outputs.date_group }}
          PAYLOAD_MONTH_GROUP: ${{ steps.digest.outputs.month_group }}
          PAYLOAD_HASHES: ${{ steps.digest.outputs.hashes }}
        with:
          script: |
            const WIKI_API_URL = process.env.WIKI_API_URL;
            const WIKI_API_KEY = process.env.WIKI_API_KEY;

            if (!WIKI_API_URL || !WIKI_API_KEY) {
              console.error("Missing WIKI_API_URL or WIKI_API_KEY secrets");
              process.exit(1);
            }

            const content = process.env.PAYLOAD_CONTENT;
            const hashes = process.env.PAYLOAD_HASHES || "";
            const keywords = hashes.split(",").filter(h => h.trim());

            const payload = {
              title: process.env.PAYLOAD_TITLE,
              content: content,
              category: "log",
              icon: "📝",
              tags: ["ganengile"],
              keywords: keywords,
              date_group: process.env.PAYLOAD_DATE_GROUP,
              month_group: process.env.PAYLOAD_MONTH_GROUP
            };

            console.log("Sending daily digest, commits:", keywords.length);

            try {
              const response = await fetch(WIKI_API_URL, {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'x-api-key': WIKI_API_KEY
                },
                body: JSON.stringify(payload)
              });

              if (!response.ok) {
                const text = await response.text();
                throw new Error(`HTTP error! status: ${response.status}, message: ${text}`);
              }

              const data = await response.json();
              console.log("Success:", data);
            } catch (error) {
              console.error("Failed to sync to wiki:", error);
              process.exit(1);
            }
