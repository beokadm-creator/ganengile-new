    <text x="149" y="604" font-family="Inter, Pretendard, system-ui" font-size="11" font-weight="700" fill="#3538CD">Leg: 역→역</text>
    <text x="149" y="622" font-family="Inter, Pretendard, system-ui" font-size="11" font-weight="600" fill="#475467">오퍼 전(후보 5명)</text>
