  <text x="132" y="494" font-family="Inter, Pretendard, system-ui" font-size="13" font-weight="800" fill="#101828">미션(Job) 보드</text>

  <!-- Job columns: startX=132 colW=210 gap=10 (6 cols) -->
  <g>
    <rect x="132" y="508" width="210" height="40" rx="10" ry="10" fill="#F2F4F7" stroke="#E4E7EC"/><text x="144" y="534" font-family="Inter, Pretendard, system-ui" font-size="12" font-weight="800" fill="#344054">미할당</text>
    <rect x="352" y="508" width="210" height="40" rx="10" ry="10" fill="#F2F4F7" stroke="#E4E7EC"/><text x="364" y="534" font-family="Inter, Pretendard, system-ui" font-size="12" font-weight="800" fill="#344054">오퍼중</text>
    <rect x="572" y="508" width="210" height="40" rx="10" ry="10" fill="#F2F4F7" stroke="#E4E7EC"/><text x="584" y="534" font-family="Inter, Pretendard, system-ui" font-size="12" font-weight="800" fill="#344054">수락됨</text>
    <rect x="792" y="508" width="210" height="40" rx="10" ry="10" fill="#F2F4F7" stroke="#E4E7EC"/><text x="804" y="534" font-family="Inter, Pretendard, system-ui" font-size="12" font-weight="800" fill="#344054">픽업 위험</text>
    <rect x="1012" y="508" width="210" height="40" rx="10" ry="10" fill="#F2F4F7" stroke="#E4E7EC"/><text x="1024" y="534" font-family="Inter, Pretendard, system-ui" font-size="12" font-weight="800" fill="#344054">배송 위험</text>
    <rect x="1232" y="508" width="220" height="40" rx="10" ry="10" fill="#F2F4F7" stroke="#E4E7EC"/><text x="1244" y="534" font-family="Inter, Pretendard, system-ui" font-size="12" font-weight="800" fill="#344054">실패/반송</text>
  </g>

  <!-- Job cards (200x122) -->
  <g>
    <rect x="137" y="560" width="200" height="122" rx="12" ry="12" fill="#FFFFFF" stroke="#D0D5DD"/>
