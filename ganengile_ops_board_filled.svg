    <text x="369" y="604" font-family="Inter, Pretendard, system-ui" font-size="11" font-weight="700" fill="#3538CD">Offering</text>
    <text x="369" y="622" font-family="Inter, Pretendard, system-ui" font-size="11" font-weight="600" fill="#475467">거절 1 / 타임아웃 1</text>
    <text x="369" y="642" font-family="Inter, Pretendard, system-ui" font-size="11" font-weight="700" fill="#667085">다음: 서지 +1,000</text>

    <rect x="577" y="560" width="200" height="122" rx="12" ry="12" fill="#FFFFFF" stroke="#D0D5DD"/>
    <text x="589" y="584" font-family="Inter, Pretendard, system-ui" font-size="12" font-weight="800" fill="#101828">JOB-2291</text>
    <text x="589" y="604" font-family="Inter, Pretendard, system-ui" font-size="11" font-weight="700" fill="#027A48">Accepted</text>
    <text x="589" y="622" font-family="Inter, Pretendard, system-ui" font-size="11" font-weight="600" fill="#475467">길러: G-221</text>
    <text x="589" y="642" font-family="Inter, Pretendard, system-ui" font-size="11" font-weight="700" fill="#667085">다음: 체크인 모니터링</text>

    <rect x="797" y="560" width="200" height="122" rx="12" ry="12" fill="#F0F9FF" stroke="#D0D5DD"/>
    <text x="809" y="584" font-family="Inter, Pretendard, system-ui" font-size="12" font-weight="800" fill="#101828">JOB-2284</text>
    <text x="809" y="604" font-family="Inter, Pretendard, system-ui" font-size="11" font-weight="800" fill="#026AA2">Pickup At Risk</text>
    <text x="809" y="622" font-family="Inter, Pretendard, system-ui" font-size="11" font-weight="600" fill="#475467">SLA -6분, 체크인 없음</text>
    <text x="809" y="642" font-family="Inter, Pretendard, system-ui" font-size="11" font-weight="700" fill="#667085">다음: 콜/재배차</text>

    <rect x="1017" y="560" width="200" height="122" rx="12" ry="12" fill="#F0F9FF" stroke="#D0D5DD"/>
    <text x="1029" y="584" font-family="Inter, Pretendard, system-ui" font-size="12" font-weight="800" fill="#101828">JOB-2279</text>
    <text x="1029" y="604" font-family="Inter, Pretendard, system-ui" font-size="11" font-weight="800" fill="#026AA2">Delivery At Risk</text>
    <text x="1029" y="622" font-family="Inter, Pretendard, system-ui" font-size="11" font-weight="600" fill="#475467">ETA drift +9분</text>
    <text x="1029" y="642" font-family="Inter, Pretendard, system-ui" font-size="11" font-weight="700" fill="#667085">다음: 고객 공지</text>

    <rect x="1237" y="560" width="215" height="122" rx="12" ry="12" fill="#FFF1F3" stroke="#D0D5DD"/>
    <text x="1249" y="584" font-family="Inter, Pretendard, system-ui" font-size="12" font-weight="800" fill="#101828">JOB-2268</text>
    <text x="1249" y="604" font-family="Inter, Pretendard, system-ui" font-size="11" font-weight="800" fill="#B42318">Fail/Return</text>
    <text x="1249" y="622" font-family="Inter, Pretendard, system-ui" font-size="11" font-weight="600" fill="#475467">사유: 인계 실패</text>
    <text x="1249" y="642" font-family="Inter, Pretendard, system-ui" font-size="11" font-weight="700" fill="#667085">다음: 반송/재배송</text>
