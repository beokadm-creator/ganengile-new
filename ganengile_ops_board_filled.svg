<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200">
  <rect x="0" y="0" width="1600" height="1200" fill="#F8FAFC"/>

  <text x="80" y="60" font-family="Inter, Pretendard, system-ui" font-size="22" font-weight="800" fill="#101828">
    02_Boards / Ops Board (Filled)
  </text>
  <text x="80" y="86" font-family="Inter, Pretendard, system-ui" font-size="13" font-weight="600" fill="#667085">
    운영/오케스트레이션 — 주문(Shipment) + 미션(Job) 2단 보드, At Risk/재배차까지 “내용 채움”
  </text>

  <rect x="80" y="120" width="1440" height="1000" rx="16" ry="16" fill="#FFFFFF" stroke="#D0D5DD" stroke-width="2"/>
  <rect x="112" y="184" width="1376" height="904" rx="12" ry="12" fill="#FFFFFF" stroke="#EAECF0" stroke-width="2"/>

  <!-- Shipment board header -->
  <text x="132" y="230" font-family="Inter, Pretendard, system-ui" font-size="13" font-weight="800" fill="#101828">주문(Shipment) 보드</text>

  <!-- Shipment columns: startX=132 colW=180 gap=10 (7 cols) -->
  <g>
    <rect x="132" y="244" width="180" height="40" rx="10" ry="10" fill="#F2F4F7" stroke="#E4E7EC"/><text x="144" y="270" font-family="Inter, Pretendard, system-ui" font-size="12" font-weight="800" fill="#344054">신규</text>
    <rect x="322" y="244" width="180" height="40" rx="10" ry="10" fill="#F2F4F7" stroke="#E4E7EC"/><text x="334" y="270" font-family="Inter, Pretendard, system-ui" font-size="12" font-weight="800" fill="#344054">검증 보류</text>
    <rect x="512" y="244" width="180" height="40" rx="10" ry="10" fill="#F2F4F7" stroke="#E4E7EC"/><text x="524" y="270" font-family="Inter, Pretendard, system-ui" font-size="12" font-weight="800" fill="#344054">배차 설계</text>
    <rect x="702" y="244" width="180" height="40" rx="10" ry="10" fill="#F2F4F7" stroke="#E4E7EC"/><text x="714" y="270" font-family="Inter, Pretendard, system-ui" font-size="12" font-weight="800" fill="#344054">모니터링</text>
    <rect x="892" y="244" width="180" height="40" rx="10" ry="10" fill="#F2F4F7" stroke="#E4E7EC"/><text x="904" y="270" font-family="Inter, Pretendard, system-ui" font-size="12" font-weight="800" fill="#344054">예외 대응</text>
    <rect x="1082" y="244" width="180" height="40" rx="10" ry="10" fill="#F2F4F7" stroke="#E4E7EC"/><text x="1094" y="270" font-family="Inter, Pretendard, system-ui" font-size="12" font-weight="800" fill="#344054">정산/리포트</text>
    <rect x="1272" y="244" width="180" height="40" rx="10" ry="10" fill="#F2F4F7" stroke="#E4E7EC"/><text x="1284" y="270" font-family="Inter, Pretendard, system-ui" font-size="12" font-weight="800" fill="#344054">클로즈</text>
  </g>

  <!-- Shipment cards (170x122) -->
  <g>
    <rect x="137" y="296" width="170" height="122" rx="12" ry="12" fill="#FFFFFF" stroke="#D0D5DD"/>
    <text x="149" y="320" font-family="Inter, Pretendard, system-ui" font-size="12" font-weight="800" fill="#101828">REQ-1102</text>
    <text x="149" y="340" font-family="Inter, Pretendard, system-ui" font-size="11" font-weight="700" fill="#3538CD">Hybrid</text>
    <text x="149" y="358" font-family="Inter, Pretendard, system-ui" font-size="11" font-weight="600" fill="#475467">SLA: 18:20/19:10</text>
    <text x="149" y="376" font-family="Inter, Pretendard, system-ui" font-size="11" font-weight="600" fill="#475467">검증: 대기</text>
    <text x="149" y="396" font-family="Inter, Pretendard, system-ui" font-size="11" font-weight="700" fill="#667085">다음: 검증</text>

    <rect x="327" y="296" width="170" height="122" rx="12" ry="12" fill="#FFF6ED" stroke="#D0D5DD"/>
