    <text x="339" y="340" font-family="Inter, Pretendard, system-ui" font-size="11" font-weight="800" fill="#B54708">Validation Hold</text>
    <text x="339" y="358" font-family="Inter, Pretendard, system-ui" font-size="11" font-weight="600" fill="#475467">사유: 주소/역 불명확</text>
    <text x="339" y="376" font-family="Inter, Pretendard, system-ui" font-size="11" font-weight="600" fill="#475467">요청자 연락 필요</text>
    <text x="339" y="396" font-family="Inter, Pretendard, system-ui" font-size="11" font-weight="700" fill="#667085">다음: 확인</text>

    <rect x="517" y="296" width="170" height="122" rx="12" ry="12" fill="#FFFFFF" stroke="#D0D5DD"/>
    <text x="529" y="320" font-family="Inter, Pretendard, system-ui" font-size="12" font-weight="800" fill="#101828">REQ-1098</text>
    <text x="529" y="340" font-family="Inter, Pretendard, system-ui" font-size="11" font-weight="700" fill="#3538CD">Planning</text>
    <text x="529" y="358" font-family="Inter, Pretendard, system-ui" font-size="11" font-weight="600" fill="#475467">오퍼: 2회 거절</text>
    <text x="529" y="376" font-family="Inter, Pretendard, system-ui" font-size="11" font-weight="600" fill="#475467">조치: 서지 +권역확장</text>
    <text x="529" y="396" font-family="Inter, Pretendard, system-ui" font-size="11" font-weight="700" fill="#667085">다음: 재오퍼</text>

    <rect x="707" y="296" width="170" height="122" rx="12" ry="12" fill="#F0F9FF" stroke="#D0D5DD"/>
    <text x="719" y="320" font-family="Inter, Pretendard, system-ui" font-size="12" font-weight="800" fill="#101828">REQ-1081</text>
    <text x="719" y="340" font-family="Inter, Pretendard, system-ui" font-size="11" font-weight="800" fill="#026AA2">Monitoring</text>
    <text x="719" y="358" font-family="Inter, Pretendard, system-ui" font-size="11" font-weight="600" fill="#475467">At Risk: +8분</text>
    <text x="719" y="376" font-family="Inter, Pretendard, system-ui" font-size="11" font-weight="600" fill="#475467">원인: 체크인 미발생</text>
